# =============================================================================
# docker-compose.yml — vLLM & SGLang on AMD RDNA 4
# =============================================================================
# Usage:
#   docker compose --profile qwen-int8 up qwen-int8
#   docker compose --profile qwen-tq up qwen-tq
#   docker compose --profile glm up glm
#   docker compose --profile genesis up genesis-dryrun
#
# Environment:
#   VLLM_PORT       — vLLM API port (default per service)
#   GLM_PORT        — GLM service port (default: 8002)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # vLLM — High-throughput inference engine (base service)
  # ---------------------------------------------------------------------------
  vllm_base:
    image: vllm/vllm-openai-rocm:nightly
    stdin_open: true
    tty: true
    entrypoint: /bin/bash
    network_mode: host
    privileged: true
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    ipc: host
    shm_size: 32G
    runtime: amd
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ./cache:/root/cache
      - ./cache/vllm:/root/.cache/vllm
      # Genesis vLLM patches — mount _genesis into vllm site-packages
      - ./genesis/vllm/_genesis:/usr/local/lib/python3.12/dist-packages/vllm/_genesis:ro
    environment:
      - TRITON_CACHE_DIR=/root/cache/triton
      - PYTORCH_TUNABLEOP_FILENAME=/root/cache/tunableop/tunableop_merged.csv
      - PYTORCH_TUNABLEOP_UNTUNED_FILENAME=/root/cache/tunableop/tunableop_untuned.csv
      - PYTORCH_ROCM_ARCH=gfx1201
      - VLLM_USE_V2_MODEL_RUNNER=0
      - VLLM_LOGGING_LEVEL=INFO
      - AMD_VISIBLE_DEVICES=0,1
      - FLASH_ATTENTION_TRITON_AMD_ENABLE=TRUE
      - VLLM_USE_TRITON_AWQ=1
      - HSA_ENABLE_SDMA=0
      - HSA_ENABLE_PEER_SDMA=0
      - HSA_NO_SCRATCH_RECLAIM=1
      - NCCL_P2P_LEVEL=SYS
      - PYTORCH_ALLOC_CONF=expandable_segments:True
      # Genesis patch system
      - GENESIS_VLLM_PIN_POLICY=warn
      # Genesis opt-in patches (shared — MoE/scheduler/correctness)
      - GENESIS_ENABLE_P72_PROFILE_RUN_CAP=1
      - GENESIS_ENABLE_P31_MOE_ROUTER_FP32_SOFTMAX=1
      - GENESIS_ENABLE_P74_CHUNK_CLAMP=1
      - GENESIS_ENABLE_P14_BLOCK_TABLE_ZERO=1
      - GENESIS_ENABLE_P86=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 3
    profiles:
      - base

  bash:
    extends:
      service: vllm_base
    container_name: rdna4-vllm-bash
    entrypoint: /bin/bash
    profiles:
      - bash

  # Quick Genesis dry-run test
  genesis-dryrun:
    extends:
      service: vllm_base
    container_name: rdna4-genesis-dryrun
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "=== Genesis vLLM Patches: DRY-RUN ==="
        python3 -m vllm._genesis.patches.apply_all --dry-run 2>&1
        echo "=== Dry-run complete ==="
    profiles:
      - genesis

  # ---------------------------------------------------------------------------
  # Qwen3.6-35B-A3B — int8_per_token_head KV cache (124K ctx, ~3.5x concurrency)
  # ---------------------------------------------------------------------------
  # Best for: throughput-sensitive workloads, low TTFT, general serving
  # KV cache: 124,416 tokens at 126,976 max-model-len → 3.53x concurrency
  # ---------------------------------------------------------------------------
  qwen-int8:
    extends:
      service: vllm_base
    container_name: rdna4-vllm-qwen-int8
    environment:
      # Qwen3.6-specific Genesis patches (hybrid Mamba/MoE)
      - GENESIS_ENABLE_P34_MAMBA_DEADLOCK_GUARD=1
      - GENESIS_ENABLE_PN55_WAKE_UP_HYBRID_KV=1
      - GENESIS_ENABLE_PN51_QWEN3_STREAMING_THINKING_DISABLED=1
      - GENESIS_ENABLE_PN66=1
      - GENESIS_ENABLE_PN67=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${VLLM_PORT:-8000}/health"]
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "=== Genesis vLLM Patches: applying ==="
        python3 -m vllm._genesis.patches.apply_all 2>&1 | tee /root/cache/genesis_apply.log
        echo "=== Genesis apply done, starting vllm serve ==="
        exec vllm serve \
          --model cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit \
          -tp 2 \
          --enable-expert-parallel \
          --port ${VLLM_PORT:-8000} \
          --enable-chunked-prefill \
          --max-model-len 126976 \
          --max-num-seqs 64 \
          --block-size 256 \
          --dtype float16 \
          --gpu-memory-utilization 0.92 \
          --kv-cache-dtype int8_per_token_head \
          --language-model-only \
          --served-model-name model \
          --max-num-batched-tokens 8192 \
          --reasoning-parser qwen3 \
          --enable-auto-tool-choice \
          --tool-call-parser qwen3_coder \
          --default-chat-template-kwargs '{"preserve_thinking": true}' \
          --trust-remote-code \
          --no-disable-cascade-attn \
          --renderer-num-workers 2 \
          --enable-prefix-caching \
          --prefix-caching-hash-algo xxhash \
          --max-num-partial-prefills 1 \
          --mm-processor-cache-gb 0
    profiles:
      - qwen-int8

  # ---------------------------------------------------------------------------
  # Qwen3.6-35B-A3B — turboquant_k8v4 KV cache (168K ctx, ~3.5x concurrency)
  # ---------------------------------------------------------------------------
  # Best for: long-context workloads needing max KV capacity (+36% vs int8)
  # KV cache: 168,960 tokens at 172,032 max-model-len → 3.53x concurrency
  # Trade-off: ~1.5% lower throughput, cold-start TTFT spike (TQ JIT compile)
  # ---------------------------------------------------------------------------
  qwen-tq:
    extends:
      service: vllm_base
    container_name: rdna4-vllm-qwen-tq
    environment:
      # Qwen3.6-specific Genesis patches (hybrid Mamba/MoE)
      - GENESIS_ENABLE_P34_MAMBA_DEADLOCK_GUARD=1
      - GENESIS_ENABLE_PN55_WAKE_UP_HYBRID_KV=1
      - GENESIS_ENABLE_PN51_QWEN3_STREAMING_THINKING_DISABLED=1
      - GENESIS_ENABLE_PN66=1
      - GENESIS_ENABLE_PN67=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${VLLM_PORT:-8001}/health"]
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "=== Genesis vLLM Patches: applying ==="
        python3 -m vllm._genesis.patches.apply_all 2>&1 | tee /root/cache/genesis_apply.log
        echo "=== Genesis apply done, starting vllm serve ==="
        exec vllm serve \
          --model cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit \
          -tp 2 \
          --enable-expert-parallel \
          --port ${VLLM_PORT:-8001} \
          --enable-chunked-prefill \
          --max-model-len 172032 \
          --max-num-seqs 64 \
          --block-size 256 \
          --dtype float16 \
          --gpu-memory-utilization 0.92 \
          --kv-cache-dtype turboquant_k8v4 \
          --language-model-only \
          --served-model-name model \
          --max-num-batched-tokens 8192 \
          --reasoning-parser qwen3 \
          --enable-auto-tool-choice \
          --tool-call-parser qwen3_coder \
          --default-chat-template-kwargs '{"preserve_thinking": true}' \
          --trust-remote-code \
          --no-disable-cascade-attn \
          --renderer-num-workers 2 \
          --enable-prefix-caching \
          --prefix-caching-hash-algo xxhash \
          --max-num-partial-prefills 1 \
          --mm-processor-cache-gb 0
    profiles:
      - qwen-tq

  # ---------------------------------------------------------------------------
  # GLM-4.7-Flash (MoE + MLA, AWQ 4-bit) — optimized serving
  # ---------------------------------------------------------------------------
  # Architecture: glm4_moe_lite — 47 layers, 64 routed experts (top-4),
  #   MLA attention (kv_lora_rank=512), 1 MTP speculative-decoding layer
  # MLA requires fp8_e4m3 KV cache (int8_per_token_head not supported)
  # ---------------------------------------------------------------------------
  glm:
    extends:
      service: vllm_base
    container_name: rdna4-vllm-glm
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${GLM_PORT:-8002}/health"]
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "=== Genesis vLLM Patches: applying ==="
        python3 -m vllm._genesis.patches.apply_all 2>&1 | tee /root/cache/genesis_apply_glm.log
        echo "=== Genesis apply done, starting vllm serve ==="
        exec vllm serve \
          --model cyankiwi/GLM-4.7-Flash-AWQ-4bit \
          -tp 2 \
          --enable-expert-parallel \
          --port ${GLM_PORT:-8002} \
          --enable-chunked-prefill \
          --max-model-len 65536 \
          --max-num-seqs 64 \
          --block-size 256 \
          --dtype float16 \
          --gpu-memory-utilization 0.95 \
          --kv-cache-dtype fp8_e4m3 \
          --served-model-name model \
          --max-num-batched-tokens 8192 \
          --reasoning-parser glm45 \
          --enable-auto-tool-choice \
          --tool-call-parser glm47 \
          --trust-remote-code \
          --no-disable-cascade-attn \
          --renderer-num-workers 2 \
          --enable-prefix-caching \
          --prefix-caching-hash-algo xxhash \
          --max-num-partial-prefills 1 \
          --mm-processor-cache-gb 0
    profiles:
      - glm
